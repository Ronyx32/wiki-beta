<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Codex - Enciclopédia de Personagens</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            background-image: 
                radial-gradient(at 20% 30%, rgba(138, 43, 226, 0.15) 0px, transparent 50%),
                radial-gradient(at 80% 70%, rgba(30, 144, 255, 0.15) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(0, 206, 209, 0.1) 0px, transparent 50%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, 
                #ff6b6b, 
                #4ecdc4, 
                #45b7d1, 
                #8b5cf6, 
                #ff6b6b
            );
            background-size: 200% 100%;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        h1 {
            font-size: 3.5em;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b6b 0%, #4ecdc4 25%, #45b7d1 50%, #8b5cf6 75%, #ff6b6b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            letter-spacing: 2px;
            text-shadow: 0 0 30px rgba(78, 205, 196, 0.3);
            animation: titleGlow 3s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }

        .subtitle {
            color: #a0a0a0;
            font-size: 1.1em;
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            padding: 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-group label {
            font-size: 0.85em;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select, input {
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: white;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        select:hover, input:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(78, 205, 196, 0.5);
            transform: translateY(-2px);
        }

        select:focus, input:focus {
            outline: none;
            border-color: #4ecdc4;
            box-shadow: 
                0 0 20px rgba(78, 205, 196, 0.4),
                0 4px 15px rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.15);
        }

        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .character-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 0;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .character-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: var(--rarity-color);
            z-index: 1;
        }

        .character-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 0%, var(--rarity-color), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }

        .character-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.4),
                0 0 40px var(--rarity-color);
            border-color: var(--rarity-color);
        }

        .character-card:hover::after {
            opacity: 0.15;
        }

        .character-card.rarity-comum { --rarity-color: #808080; }
        .character-card.rarity-incomum { --rarity-color: #4CAF50; }
        .character-card.rarity-raro { --rarity-color: #2196F3; }
        .character-card.rarity-epico { --rarity-color: #9C27B0; }
        .character-card.rarity-lendario { --rarity-color: #FF9800; }
        .character-card.rarity-calamidades { --rarity-color: #8B00FF; }
        .character-card.rarity-mitico { --rarity-color: #F44336; }
        
        /* Efeito especial para Calamidades */
        .character-card.rarity-calamidades::before {
            background: linear-gradient(90deg, #8B00FF, #FF00FF, #00FFFF, #8B00FF);
            background-size: 300% 100%;
            animation: calamityGlow 3s ease infinite;
        }
        
        @keyframes calamityGlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .character-card.rarity-calamidades:hover {
            box-shadow: 0 10px 40px rgba(139, 0, 255, 0.6);
        }
        
        .rarity-badge.rarity-calamidades {
            background: linear-gradient(135deg, #8B00FF, #FF00FF);
            box-shadow: 0 0 20px rgba(139, 0, 255, 0.5);
            animation: badgePulse 2s ease infinite;
        }
        
        @keyframes badgePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #4ecdc4, #8b5cf6);
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #45b7d1, #9d6dff);
        }

        /* Smooth scroll */
        html {
            scroll-behavior: smooth;
        }

        .character-image {
            width: 100%;
            height: 220px;
            background: linear-gradient(135deg, rgba(78, 205, 196, 0.2), rgba(255, 107, 107, 0.2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
            overflow: hidden;
        }

        .character-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
        }

        .character-info {
            padding: 20px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .character-name {
            font-size: 1.5em;
            font-weight: bold;
            color: white;
        }

        .rarity-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: var(--rarity-color);
            color: white;
        }

        .stats-preview {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 0.9em;
        }

        .stat-label {
            color: #888;
        }

        .stat-value {
            font-weight: bold;
            color: #4ecdc4;
        }

        .story-preview {
            color: #aaa;
            font-size: 0.9em;
            line-height: 1.5;
            margin-top: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal.active {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(30, 30, 63, 0.95) 0%, rgba(42, 42, 78, 0.95) 100%);
            border-radius: 25px;
            max-width: 900px;
            width: 100%;
            padding: 40px;
            position: relative;
            border: 2px solid var(--rarity-color);
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.6),
                0 0 60px var(--rarity-color),
                inset 0 0 80px rgba(255, 255, 255, 0.03);
            max-height: 90vh;
            overflow-y: auto;
            backdrop-filter: blur(20px);
            animation: modalSlideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalSlideIn {
            from { 
                opacity: 0;
                transform: scale(0.9) translateY(30px);
            }
            to { 
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            font-size: 1.5em;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        .modal-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .modal-character-image {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 5px solid var(--rarity-color);
            box-shadow: 
                0 0 40px var(--rarity-color),
                0 0 80px rgba(0, 0, 0, 0.5),
                inset 0 0 30px rgba(255, 255, 255, 0.1);
            background: linear-gradient(135deg, rgba(78, 205, 196, 0.3), rgba(255, 107, 107, 0.3));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5em;
            overflow: hidden;
            position: relative;
            animation: imagePulse 3s ease-in-out infinite;
        }

        @keyframes imagePulse {
            0%, 100% { 
                box-shadow: 
                    0 0 40px var(--rarity-color),
                    0 0 80px rgba(0, 0, 0, 0.5);
            }
            50% { 
                box-shadow: 
                    0 0 60px var(--rarity-color),
                    0 0 100px rgba(0, 0, 0, 0.5);
            }
        }

        .modal-character-image img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: contain;
            object-position: center;
        }

        .modal-title {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: white;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .tab {
            padding: 15px 30px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            font-weight: 600;
            position: relative;
        }

        .tab::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--rarity-color);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .tab:hover {
            color: #ccc;
            background: rgba(255, 255, 255, 0.05);
        }

        .tab.active {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .tab.active::before {
            transform: scaleX(1);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stats-detailed {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-detailed {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--rarity-color);
        }

        .stat-detailed-label {
            font-size: 0.9em;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-detailed-value {
            font-size: 2em;
            font-weight: bold;
            color: white;
            margin-bottom: 10px;
        }

        .stat-bar {
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .stat-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--rarity-color), #4ecdc4, var(--rarity-color));
            background-size: 200% 100%;
            border-radius: 10px;
            transition: width 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 
                0 0 10px var(--rarity-color),
                inset 0 1px 2px rgba(255, 255, 255, 0.3);
            animation: statGlow 3s ease-in-out infinite;
        }

        @keyframes statGlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .radar-chart {
            margin: 30px 0;
            text-align: center;
        }

        canvas {
            max-width: 100%;
            height: auto;
        }

        .story-content {
            background: rgba(255, 255, 255, 0.03);
            padding: 25px;
            border-radius: 12px;
            line-height: 1.8;
            font-size: 1.05em;
            color: #ccc;
        }

        .story-content h3 {
            color: white;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .story-content p {
            margin-bottom: 15px;
        }

        .abilities-content {
            display: grid;
            gap: 20px;
        }

        .ability-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 15px;
            border-left: 5px solid var(--rarity-color);
            transition: all 0.4s ease;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            overflow: hidden;
        }

        .ability-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: var(--rarity-color);
            box-shadow: 0 0 15px var(--rarity-color);
        }

        .ability-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(8px);
            box-shadow: 
                -5px 5px 20px rgba(0, 0, 0, 0.3),
                0 0 30px var(--rarity-color);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .ability-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .ability-name {
            font-size: 1.3em;
            font-weight: bold;
            color: white;
        }

        .ability-type {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.75em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ability-type.ativa {
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
        }

        .ability-type.passiva {
            background: linear-gradient(135deg, #4ECDC4, #44A08D);
        }

        .ability-type.ultimate {
            background: linear-gradient(135deg, #8B00FF, #FF00FF);
            box-shadow: 0 0 15px rgba(139, 0, 255, 0.4);
        }

        .ability-description {
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .ability-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ability-stat {
            display: flex;
            justify-content: space-between;
